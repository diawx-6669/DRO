<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRO — проверка датчика</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #12161b;
    --panel: #1a1f26;
    --panel-raised: #262c35;
    --border: #2a323c;
    --text: #e7eaee;
    --text-dim: #8a93a1;
    --text-faint: #5c6570;
    --accent: #e8a33d;
    --green: #4caf6d;
    --red: #e2543d;
    --font-display: "Space Grotesk", sans-serif;
    --font-body: "Inter", sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232, 163, 61, 0.08), transparent),
      var(--bg);
    font-family: var(--font-body);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 340px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 30px 26px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    text-align: center;
  }

  .card__eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .card__title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    margin: 0 0 22px 0;
    color: var(--text);
  }

  .status-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  .status-dot--live {
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(76, 175, 109, 0.3);
    animation: blink 1.6s ease-in-out infinite;
  }

  .status-dot--error {
    background: var(--red);
    box-shadow: 0 0 0 3px rgba(226, 84, 61, 0.35);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  .reading {
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 10px;
    margin-bottom: 22px;
  }

  .reading__value {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 46px;
    color: var(--accent);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .reading__unit {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  button {
    width: 100%;
    padding: 12px 16px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    background: var(--accent);
    color: #1a1206;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
  }

  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.99); }

  button:disabled {
    background: var(--panel-raised);
    color: var(--text-faint);
    cursor: default;
  }

  .hint {
    margin-top: 14px;
    font-size: 11.5px;
    color: var(--text-faint);
    line-height: 1.5;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card__eyebrow">DRO · Hardware check</div>
    <h1 class="card__title">Проверка датчика заполнения</h1>

    <div class="status-line">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Не подключено</span>
    </div>

    <div class="reading">
      <div class="reading__value" id="distance">---</div>
      <div class="reading__unit">см до поверхности</div>
    </div>

    <button id="connectBtn">Подключить Arduino</button>
    <p class="hint">
      Нужен Chrome или Edge. Плата должна отправлять в Serial одно число на строку
      (см. пример: <code>Serial.println(distanceCm)</code>).
    </p>
  </div>

<script>
  const connectBtn = document.getElementById('connectBtn');
  const distanceEl = document.getElementById('distance');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // Вытаскивает из строки ровно одно число (целое или дробное),
  // игнорируя любой сопутствующий текст/мусор в порту.
  function extractNumber(line) {
    const match = line.match(/-?\d+(\.\d+)?/);
    return match ? parseFloat(match[0]) : null;
  }

  function setStatus(state, text) {
    statusDot.className = 'status-dot' + (state ? ` status-dot--${state}` : '');
    statusText.textContent = text;
  }

  connectBtn.addEventListener('click', async () => {
    if (!('serial' in navigator)) {
      alert('Ваш браузер не поддерживает Web Serial API. Откройте сайт через Chrome или Edge.');
      return;
    }

    try {
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 9600 });

      connectBtn.textContent = 'Подключено';
      connectBtn.disabled = true;
      setStatus('live', 'Приём данных');

      const textDecoder = new TextDecoderStream();
      port.readable.pipeTo(textDecoder.writable);
      const reader = textDecoder.readable.getReader();

      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) {
          reader.releaseLock();
          break;
        }
        if (!value) continue;

        buffer += value;
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const rawLine of lines) {
          const num = extractNumber(rawLine.trim());
          if (num !== null) {
            // Одно число, один знак после запятой — без дублей и мусора.
            distanceEl.textContent = num.toFixed(1);
          }
        }
      }

      setStatus('error', 'Соединение закрыто');
    } catch (error) {
      console.error('Ошибка:', error);
      setStatus('error', 'Ошибка подключения');
      alert('Не удалось подключиться к плате: ' + error.message);
      connectBtn.disabled = false;
      connectBtn.textContent = 'Подключить Arduino';
    }
  });
</script>
</body>
</html>
